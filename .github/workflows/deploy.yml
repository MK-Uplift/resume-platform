name: Deploy to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOTNET_WEB_VERSION: '7.0.x'
  DOTNET_API_VERSION: '8.0.x'
  AWS_REGION: 'ap-southeast-4'
  S3_BUCKET: 'mk-uplift-resume-web'
  CLOUDFRONT_DISTRIBUTION_ID: 'E1XRRA7RBLQI4C'
  ECR_REPOSITORY: 'resume-api'
  ECS_CLUSTER: 'resume-cluster'
  ECS_SERVICE: 'resume-api-service'

jobs:
  deploy-web:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_WEB_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Resume.Web/Resume.Web.csproj

      - name: Build
        run: dotnet build Resume.Web/Resume.Web.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish Resume.Web/Resume.Web.csproj -c Release -o publish --no-build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync publish/wwwroot/ s3://${{ env.S3_BUCKET }}/ --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Frontend deployment complete
        run: |
          echo "🚀 Frontend deployment successful!"
          echo "Site URL: https://ddcfte7n5r9tt.cloudfront.net"

  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get ECR repository URI
        id: ecr-uri
        run: |
          ECR_URI=$(aws ecr describe-repositories --repository-names ${{ env.ECR_REPOSITORY }} --query 'repositories[0].repositoryUri' --output text)
          echo "uri=$ECR_URI" >> $GITHUB_OUTPUT

      - name: Build Docker image
        working-directory: Resume.Api
        run: |
          docker build -t ${{ steps.ecr-uri.outputs.uri }}:latest .
          docker tag ${{ steps.ecr-uri.outputs.uri }}:latest ${{ steps.ecr-uri.outputs.uri }}:${{ github.sha }}

      - name: Push Docker image to ECR
        run: |
          docker push ${{ steps.ecr-uri.outputs.uri }}:latest
          docker push ${{ steps.ecr-uri.outputs.uri }}:${{ github.sha }}

      - name: Get latest task definition
        id: get-task-def
        run: |
          TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }} \
            --query 'services[0].taskDefinition' \
            --output text)
          echo "arn=$TASK_DEF_ARN" >> $GITHUB_OUTPUT

      - name: Update ECS task definition with new image
        id: task-def-render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition-arn: ${{ steps.get-task-def.outputs.arn }}
          container-name: resume-api
          image: ${{ steps.ecr-uri.outputs.uri }}:${{ github.sha }}

      - name: Ensure health check uses curl
        id: task-def
        run: |
          python3 -c "
          import json
          with open('${{ steps.task-def-render.outputs.task-definition }}') as f:
              td = json.load(f)
          td['containerDefinitions'][0]['healthCheck'] = {
              'command': ['CMD-SHELL', 'curl -f http://localhost:8080/health || exit 1'],
              'interval': 30,
              'timeout': 5,
              'retries': 3,
              'startPeriod': 60
          }
          out = '/tmp/taskdef-final.json'
          with open(out, 'w') as f:
              json.dump(td, f)
          print(f'task-definition={out}')
          " >> $GITHUB_OUTPUT

      - name: Deploy new task definition to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: false

      - name: Get ALB URL
        id: alb-url
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers --names resume-api-alb --query 'LoadBalancers[0].DNSName' --output text)
          echo "url=http://$ALB_DNS" >> $GITHUB_OUTPUT

      - name: API deployment complete
        run: |
          echo "🚀 API deployment successful!"
          echo "API URL: ${{ steps.alb-url.outputs.url }}"
